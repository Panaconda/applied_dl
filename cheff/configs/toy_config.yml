model:
  base_learning_rate: 5.0e-05
  target: cheff.ldm.models.diffusion.ddpm.LatentDiffusion
  params:
    linear_start: 0.0015
    linear_end: 0.0295
    num_timesteps_cond: 1
    log_every_t: 200
    timesteps: 1000
    first_stage_key: image
    cond_stage_key: caption
    image_size: 32
    channels: 3
    cond_stage_trainable: true
    conditioning_key: crossattn
    monitor: val/loss_simple_ema
    scale_factor: 0.18215

    lora_config:
      enabled: True
      rank: 16
      alpha: 32
      dropout: 0.05
      # Toggle: "cross" for attn2 only, "attn" for attn1+attn2 ,"full" for attn1 + attn2 + ff
      adaptation_scope: "attn"
      target_modules: ["to_q", "to_k", "to_v", "to_out.0"]
      ff_modules: ["proj", "net.2"]

    unet_config:
      target: cheff.ldm.modules.diffusionmodules.openaimodel.UNetModel
      params:
        image_size: 64
        in_channels: 3
        out_channels: 3
        model_channels: 32
        attention_resolutions:
          - 4
          - 2
        num_res_blocks: 1
        channel_mult:
          - 1
          - 2
        num_heads: 2
        use_spatial_transformer: true
        transformer_depth: 1
        context_dim: 1280
        use_checkpoint: false
        legacy: False

    first_stage_config:
      target: ldm.models.autoencoder.AutoencoderKL
      params:
        embed_dim: 3
        ckpt_path: trained_models/cheff_autoencoder.pt
        ddconfig:
          double_z: True
          z_channels: 3
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 32
          ch_mult:
            - 1
            - 2
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
        lossconfig:
          target: torch.nn.Identity

    cond_stage_config:
      target: cheff.ldm.modules.encoders.modules.BERTEmbedder
      params:
        n_embed: 1280
        n_layer: 32

data:
  params:
    batch_size: 8
    machex_path: /toy_data
    test_size: 10000
    num_workers: 16
    mimic: true

lightning:
  callbacks:
    image_logger:
      target: scripts.01_train_ldm.ImageLogger
      params:
        batch_frequency: 5000
        max_images: 8
        increase_log_steps: False

  trainer:
    gpus: 4
    benchmark: False
