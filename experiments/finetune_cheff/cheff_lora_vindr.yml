# CheFF T2I config with LoRA for VinDr-PCXR fine-tuning.
#
# Architecture mirrors cheff-diff-t2i.yml.  Key differences:
#   - cond_stage_trainable: false   (BERT frozen, LoRA targets UNet only)
#   - lora_config block added
#   - ckpt_path fields left empty   (filled at runtime via CLI overrides)
#
# Usage (via finetune_cheff/train.py — paths injected automatically):
#   python cheff/scripts/01_train_ldm.py -b <this file> -t True \
#       model.params.ckpt_path=<T2I ckpt> \
#       model.params.first_stage_config.params.ckpt_path=<AE ckpt> \
#       data.params.machex_path=<prepared data>

model:
  base_learning_rate: 5.0e-05
  target: cheff.ldm.models.diffusion.ddpm.LatentDiffusion
  params:
    linear_start: 0.0015
    linear_end: 0.0295
    num_timesteps_cond: 1
    log_every_t: 200
    timesteps: 1000
    first_stage_key: image
    cond_stage_key: caption
    image_size: 64
    channels: 3
    cond_stage_trainable: false          # <-- frozen BERT
    conditioning_key: crossattn
    monitor: val/loss_simple_ema
    scale_factor: 0.18215

    lora_config:                         # <-- LoRA block
      enabled: true
      rank: 16
      alpha: 32
      dropout: 0.0
      adaptation_scope: attn
      target_modules:
        - to_q
        - to_k
        - to_v
        - to_out.0

    unet_config:
      target: cheff.ldm.modules.diffusionmodules.openaimodel.UNetModel
      params:
        image_size: 64
        in_channels: 3
        out_channels: 3
        model_channels: 224
        attention_resolutions:
          - 8
          - 4
          - 2
        num_res_blocks: 2
        channel_mult:
          - 1
          - 2
          - 4
          - 4
        num_heads: 8
        use_spatial_transformer: true
        transformer_depth: 1
        context_dim: 1280
        use_checkpoint: true
        legacy: False

    first_stage_config:
      target: cheff.ldm.models.autoencoder.AutoencoderKL
      params:
        embed_dim: 3
        ddconfig:
          double_z: True
          z_channels: 3
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
            - 1
            - 2
            - 4
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
        lossconfig:
          target: torch.nn.Identity

    cond_stage_config:
      target: cheff.ldm.modules.encoders.modules.BERTEmbedder
      params:
        n_embed: 1280
        n_layer: 32

data:
  params:
    batch_size: 8
    test_size: 500
    num_workers: 4
    mimic: true

lightning:
  logger:
    target: pytorch_lightning.loggers.TensorBoardLogger
    params:
      save_dir: logs
      name: cheff_lora_vindr
  trainer:
    max_epochs: 50
